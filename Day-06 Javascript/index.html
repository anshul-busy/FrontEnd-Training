<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="script.js">
    <title>Calculator</title>
</head>
<body>

    <main>
       
        <article>
        <div class="input-field">
             <input type="text" id="result" placeholder="RESULT = " disabled >
             <input type="text" id="result" placeholder="OUTPUT = " disabled>
        </div>

            <div class="parent">
            <div class="row1">
            <button>1</button>
            <button>2</button>
            <button>3</button>
            <button>+</button>
            </div>
            
            <div class="row2">
            <button>4</button>
            <button>5</button>
            <button>6</button>
            <button>-</button>
            </div>

            <div class="row3">
             <button>7</button>
            <button>8</button>
            <button>9</button>
            <button>*</button>
            </div>

            <div class="row4">
            <button>0</button>
            <button>=</button>
            <button>/</button>
            </div>
              </div>

        </article>

    </main>

    
</body>
</html>
